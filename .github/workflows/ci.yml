name: Backend and Frontend Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: Testing/Backend
        run: |
          python -m pip install --upgrade pip
          pip install flask flask_sqlalchemy pytest pytest-cov

      - name: Run backend tests
        working-directory: Testing/Backend
        run: |
          pytest -v --cov=app --cov-report=term-missing

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: Testing/Frontend
        run: npm install

      - name: Run frontend tests
        working-directory: Testing/Frontend
        run: npm run test:run

      - name: Run frontend coverage
        working-directory: Testing/Frontend
        run: npm run coverage